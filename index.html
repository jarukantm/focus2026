<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Badge Collection</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  /* ====== UI ธีมเดิมของคุณเป๊ะๆ ====== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --c-bg:      #0A0E1A;
    --c-surface: #111827;
    --c-card:    #1A2235;
    --c-border:  #243050;
    --c-gold:    #F5C842;
    --c-gold2:   #E8A820;
    --c-cyan:    #22D3EE;
    --c-green:   #34D399;
    --c-red:     #F87171;
    --c-text:    #E2E8F0;
    --c-muted:   #64748B;
    --radius:    14px;
  }

  html, body { background: var(--c-bg); color: var(--c-text); font-family: 'Kanit', sans-serif; min-height: 100dvh; overflow-x: hidden; }

  /* Loading Screen */
  #loading-screen { position: fixed; inset: 0; background: var(--c-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; transition: opacity .5s ease; }
  .loader-logo { font-size: 48px; animation: pulse 1.5s ease-in-out infinite; }
  .loader-bar { width: 160px; height: 4px; background: var(--c-border); border-radius: 99px; overflow: hidden; }
  .loader-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--c-cyan), var(--c-gold)); border-radius: 99px; animation: load 1.8s ease forwards; }
  @keyframes load { to { width: 100%; } }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

  #app { display: none; flex-direction: column; min-height: 100dvh; }
  #app.visible { display: flex; }

  header { padding: 20px 20px 0; display: flex; align-items: center; gap: 14px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--c-gold); object-fit: cover; background: var(--c-card); }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-sub { font-size: 12px; color: var(--c-muted); }

  /* Tab Navigation */
  .tab-nav { display: flex; background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 0 20px; gap: 24px; position: sticky; top: 0; z-index: 10; margin-top: 15px; }
  .tab-btn { padding: 14px 0; background: none; border: none; font-family: 'Kanit', sans-serif; font-size: 14px; font-weight: 600; color: var(--c-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s ease; }
  .tab-btn.active { color: var(--c-cyan); border-bottom-color: var(--c-cyan); }

  .hero { margin: 20px 20px 0; background: linear-gradient(135deg, #1E3A5F 0%, #0A1628 100%); border: 1px solid var(--c-border); border-radius: var(--radius); padding: 24px 20px; position: relative; overflow: hidden; }
  .hero-label { font-size: 12px; color: var(--c-cyan); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hero-total { font-size: 52px; font-weight: 900; line-height: 1; font-family: 'Space Mono', monospace; background: linear-gradient(135deg, var(--c-gold), var(--c-gold2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero-total span { font-size: 24px; color: var(--c-muted); -webkit-text-fill-color: var(--c-muted); }
  .progress-bar { margin-top: 16px; height: 8px; background: var(--c-border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--c-cyan), var(--c-gold)); transition: width .8s cubic-bezier(.4,0,.2,1); }
  .progress-label { margin-top: 8px; font-size: 11px; color: var(--c-muted); display: flex; justify-content: space-between; }

  .section-title { font-size: 13px; color: var(--c-muted); letter-spacing: 1.5px; text-transform: uppercase; padding: 20px 20px 12px; }
  .badges-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 20px; }
  .badge-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 6px; background: var(--c-card); border: 1px solid var(--c-border); border-radius: var(--radius); opacity: 0.4; filter: grayscale(1); transition: all .3s ease; }
  .badge-item.earned { opacity: 1; filter: grayscale(0); border-color: var(--c-gold); background: linear-gradient(135deg, #1A2235 0%, #1E2D1A 100%); }
  .badge-icon { font-size: 26px; }
  .badge-name { font-size: 9px; text-align: center; color: var(--c-muted); font-weight: 600; }
  .badge-item.earned .badge-name { color: var(--c-gold); }

  .scan-wrap { padding: 24px 20px 12px; }
  .btn-scan { width: 100%; padding: 18px; border: none; border-radius: var(--radius); background: linear-gradient(135deg, var(--c-cyan) 0%, #0EA5E9 100%); color: #0A0E1A; font-family: 'Kanit', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 24px rgba(34,211,238,.3); }

  /* Leaderboard UI */
  .leaderboard { padding: 0 20px 20px; }
  .lb-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--c-card); border: 1px solid var(--c-border); border-radius: 10px; margin-bottom: 8px; }
  .lb-item.me { border-color: var(--c-cyan); background: rgba(34,211,238, 0.1); }
  .lb-rank { font-family: 'Space Mono', monospace; font-weight: 700; width: 30px; color: var(--c-muted); }
  .lb-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--c-border); object-fit: cover; }
  .lb-name { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-total { font-family: 'Space Mono', monospace; color: var(--c-gold); font-weight: 700; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: flex-end; justify-content: center; z-index: 200; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--c-card); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; }
  .input-field { width: 100%; padding: 14px 16px; background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 10px; color: var(--c-text); font-size: 17px; text-align: center; text-transform: uppercase; margin: 15px 0; outline: none; }
  .btn-confirm { width: 100%; padding: 16px; border: none; border-radius: 10px; background: var(--c-cyan); color: #0A0E1A; font-weight: 700; font-size: 17px; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--c-card); border: 1px solid var(--c-border); border-radius: 12px; padding: 14px 20px; z-index: 300; transition: 0.4s; opacity: 0; text-align: center; min-width: 250px; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: var(--c-green); color: var(--c-green); }
  .toast.error { border-color: var(--c-red); color: var(--c-red); }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-logo">🏆</div>
  <div style="font-size:18px;font-weight:700;color:#E2E8F0">กำลังโหลด...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="app">
  <header>
    <img id="user-avatar" class="avatar" src="" alt=""/>
    <div class="user-info">
      <div class="user-name" id="user-name">...</div>
      <div class="user-sub">Water Resource Conservation</div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" id="btn-my" onclick="switchTab('my')">Badge ของฉัน</button>
    <button class="tab-btn" id="btn-board" onclick="switchTab('board')">อันดับรวม</button>
  </nav>

  <!-- หน้า Badge ของฉัน -->
  <div id="tab-my">
    <div class="hero">
      <div class="hero-label">สะสมได้แล้ว</div>
      <div class="hero-total" id="total-count">0 <span>/ 10</span></div>
      <div class="hero-sub" id="hero-sub">ภารกิจเพื่อสิ่งแวดล้อม</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label">
        <span id="badge-count-label">0 / 10 Badge</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>

    <div class="section-title">รายการ Badge ทั้งหมด</div>
    <div class="badges-grid" id="badges-grid"></div>

    <div class="scan-wrap">
      <button class="btn-scan" onclick="openScanModal()">🔑 กรอกรหัสหรือสแกน QR</button>
    </div>
  </div>

  <!-- หน้า Leaderboard (แยกออกมาแล้ว) -->
  <div id="tab-board" style="display:none">
    <div class="section-title">TOP 10 LEADERBOARD</div>
    <div class="leaderboard" id="leaderboard-list">
      <!-- ข้อมูลจาก JS -->
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="scan-modal">
  <div class="modal">
    <h3 style="text-align:center">กรอกรหัสยืนยัน</h3>
    <input type="text" class="input-field" id="redeem-input" placeholder="กรอกรหัสที่นี่">
    <button class="btn-confirm" onclick="handleRedeem()">ยืนยันรับ Badge</button>
    <button style="width:100%;background:none;border:none;color:var(--c-muted);margin-top:15px;cursor:pointer" onclick="closeScanModal()">ยกเลิก</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwwFH9Rw91sbD_3vA0tWFQzIcpfvcuul-qwpPyJCspp1NDamwwtzmb70wXr-jwyoA/exec';
const LIFF_ID = '2009815147-aGgIrfPv';

// รายชื่อ Badge ทั้งหมด 10 รายการตามที่คุณต้องการ
const BADGE_CONFIG = [
  { id: 'FXC-A', icon: '⚡', name: 'FXC A' }, { id: 'FXC-B', icon: '⚡', name: 'FXC B' },
  { id: 'FXCXO-A', icon: '🔥', name: 'XO A' }, { id: 'FXCXO-B', icon: '🔥', name: 'XO B' },
  { id: 'FXCXU-A', icon: '💎', name: 'XU A' }, { id: 'FXCXU-B', icon: '💎', name: 'XU B' },
  { id: 'FXCXS-A', icon: '🌟', name: 'XS A' }, { id: 'FXCXS-B', icon: '🌟', name: 'XS B' },
  { id: 'SinghawayxFOCUS-A', icon: '🦁', name: 'FOCUS A' }, { id: 'SinghawayxFOCUS-B', icon: '🦁', name: 'FOCUS B' }
];

let currentUserProfile = null;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    const profile = await liff.getProfile();
    currentUserProfile = profile;
    document.getElementById('user-name').textContent = profile.displayName;
    document.getElementById('user-avatar').src = profile.pictureUrl || '';

    // ลงทะเบียน user
    await apiCall({ action: 'register', lineUserId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl });
    
    // ตรวจสอบ Auto Checkin จาก URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
      await handleRedeem(token);
    }

    await loadData();

  } catch (err) {
    console.error(err);
  } finally {
    document.getElementById('loading-screen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 500);
  }
}

async function apiCall(data) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
  return res.json();
}

async function loadData() {
  const res = await apiCall({ action: 'getProfile', lineUserId: currentUserProfile.userId });
  if (res.success) {
    const badges = res.badges || {};
    const total = badges.total || 0;
    const pct = Math.round((total / 10) * 100);

    document.getElementById('total-count').innerHTML = `${total} <span>/ 10</span>`;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('badge-count-label').textContent = `${total} / 10 Badge`;

    const grid = document.getElementById('badges-grid');
    grid.innerHTML = BADGE_CONFIG.map(b => `
      <div class="badge-item ${badges[b.id] >= 1 ? 'earned' : ''}">
        <div class="badge-icon">${b.icon}</div>
        <div class="badge-name">${b.name}</div>
      </div>
    `).join('');
  }
}

// ฟังก์ชันสลับหน้า Tab (จำเป็นมากสำหรับ Leaderboard)
function switchTab(tab) {
  const myTab = document.getElementById('tab-my');
  const boardTab = document.getElementById('tab-board');
  const myBtn = document.getElementById('btn-my');
  const boardBtn = document.getElementById('btn-board');

  if (tab === 'my') {
    myTab.style.display = 'block';
    boardTab.style.display = 'none';
    myBtn.classList.add('active');
    boardBtn.classList.remove('active');
  } else {
    myTab.style.display = 'none';
    boardTab.style.display = 'block';
    myBtn.classList.remove('active');
    boardBtn.classList.add('active');
    loadLeaderboard();
  }
}

async function loadLeaderboard() {
  const listEl = document.getElementById('leaderboard-list');
  listEl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--c-muted)">กำลังโหลด...</div>';
  
  const res = await apiCall({ action: 'getLeaderboard' });
  if (res.success) {
    listEl.innerHTML = res.leaderboard.map((u, i) => `
      <div class="lb-item ${u.displayName === currentUserProfile.displayName ? 'me' : ''}">
        <div class="lb-rank">${i+1}</div>
        <img class="lb-avatar" src="${u.pictureUrl || ''}">
        <div class="lb-name">${u.displayName}</div>
        <div class="lb-total">${u.total}</div>
      </div>
    `).join('');
  }
}

async function handleRedeem(directToken = null) {
  const input = document.getElementById('redeem-input');
  const code = directToken || input.value.trim().toUpperCase();
  if (!code) return;

  showToast("กำลังตรวจสอบ...", "info");
  const res = await apiCall({ action: 'redeemCode', lineUserId: currentUserProfile.userId, code: code });

  if (res.success) {
    showToast("สำเร็จ! คุณได้รับ Badge ใหม่", "success");
    closeScanModal();
    if (input) input.value = "";
    await loadData();
  } else {
    showToast(res.message || "รหัสไม่ถูกต้อง", "error");
  }
}

function openScanModal() { document.getElementById('scan-modal').classList.add('open'); }
function closeScanModal() { document.getElementById('scan-modal').classList.remove('open'); }
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
