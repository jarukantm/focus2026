<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Badge Collection</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<style>
/* ================= UI เดิมของคุณ (คงไว้ทั้งหมด) ================= */
body { margin:0; font-family:Kanit; background:#0A0E1A; color:#E2E8F0; }

#loading-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0A0E1A;z-index:99;flex-direction:column;gap:10px}
.loader-bar{width:160px;height:4px;background:#1A2235;border-radius:10px;overflow:hidden}
.loader-fill{height:100%;width:0;background:#22D3EE;animation:load 1.5s forwards}
@keyframes load{to{width:100%}}

#app{display:none}
#app.visible{display:block}

header{display:flex;align-items:center;gap:12px;padding:20px}
.avatar{width:44px;height:44px;border-radius:50%}
.user-name{font-weight:700}

.tab-nav{display:flex;gap:20px;padding:0 20px}
.tab-btn{background:none;border:none;color:#64748B;font-weight:600;padding:10px}
.tab-btn.active{color:#22D3EE;border-bottom:2px solid #22D3EE}

.hero{margin:20px;background:#111827;padding:20px;border-radius:12px}
.hero-total{font-size:40px;font-weight:900;color:#F5C842}

.badges-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:20px}
.badge-item{background:#1A2235;padding:10px;border-radius:10px;text-align:center}
.badge-item.earned{border:1px solid #F5C842}

.leaderboard{padding:20px}
.lb-item{display:flex;justify-content:space-between;padding:10px;background:#1A2235;margin-bottom:8px;border-radius:10px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#111827;width:100%;padding:20px;border-radius:16px 16px 0 0}

.btn{padding:14px;background:#22D3EE;border:none;width:100%;font-weight:700;border-radius:10px}
</style>
</head>

<body>

<div id="loading-screen">
  <div>🏆 Loading</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="app">

<header>
  <img id="avatar" class="avatar"/>
  <div>
    <div id="name" class="user-name">Loading...</div>
    <div style="color:#64748B;font-size:12px">Badge System</div>
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('my')">My Badge</button>
  <button class="tab-btn" onclick="switchTab('lb')">Leaderboard</button>
</div>

<!-- ================= MY ================= -->
<div id="tab-my">

  <div class="hero">
    <div>คะแนนสะสม</div>
    <div id="total" class="hero-total">0</div>
  </div>

  <div class="badges-grid" id="grid"></div>

  <button class="btn" onclick="openModal()">กรอกรหัสรับ Badge</button>

</div>

<!-- ================= LEADERBOARD ================= -->
<div id="tab-lb" style="display:none">
  <div class="leaderboard" id="lb">Loading...</div>
</div>

</div>

<!-- ================= MODAL ================= -->
<div class="modal-overlay" id="modal">
  <div class="modal">

    <h3>กรอกรหัส</h3>

    <input id="code" style="width:100%;padding:12px;margin:10px 0;text-transform:uppercase"
      placeholder="FXC-XXXX"/>

    <button class="btn" onclick="redeem()">ยืนยัน</button>

    <button class="btn" style="background:#64748B;margin-top:10px" onclick="closeModal()">ปิด</button>

  </div>
</div>

<script>

/* ================= CONFIG ================= */
const GAS = "https://script.google.com/macros/s/AKfycbzVIlpMsrVjaXYNhhj0S09vRUQrPBnhytcL3T3bH_4y2pvj9TK8BWN2kaU2nxgGUP8/exec";
const LIFF_ID = "2009815147-aGgIrfPv";

/* ================= DATA ================= */
const EVENTS = [
  "FXC","FXCXO","FXCXU","FXCXS","FOCUS"
];

let user;

/* ================= INIT ================= */
window.onload = async () => {

  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  user = await liff.getProfile();

  document.getElementById("name").innerText = user.displayName;
  document.getElementById("avatar").src = user.pictureUrl;

  await api("register", user);

  await loadProfile();

  hideLoading();

};

/* ================= API ================= */
async function api(action, data) {

  const res = await fetch(GAS, {
    method:"POST",
    body: JSON.stringify({
      action,
      lineUserId: user.userId,
      ...data
    })
  });

  return res.json();

}

/* ================= PROFILE ================= */
async function loadProfile() {

  const res = await api("getProfile");

  const badges = res.badges;

  document.getElementById("total").innerText = badges.total || 0;

  const grid = document.getElementById("grid");

  grid.innerHTML = EVENTS.map(e => `
    <div class="badge-item ${badges[e] ? 'earned':''}">
      <div>${e}</div>
      <div>${badges[e] ? "✔":"-"}</div>
    </div>
  `).join("");

}

/* ================= LEADERBOARD (FIXED) ================= */
async function loadLB() {

  const res = await api("getLeaderboard");

  const lb = document.getElementById("lb");

  if (!res.leaderboard || res.leaderboard.length === 0) {
    lb.innerHTML = "No data";
    return;
  }

  lb.innerHTML = res.leaderboard.map((u,i)=>`
    <div class="lb-item">
      <div>${i+1}. ${u.displayName}</div>
      <div>${u.total}</div>
    </div>
  `).join("");

}

/* ================= REDEEM (FIXED) ================= */
async function redeem() {

  const code = document.getElementById("code").value;

  const res = await api("redeemCode",{code});

  if (res.success) {
    alert("สำเร็จ!");
    closeModal();
    loadProfile();
  } else {
    alert(res.message);
  }

}

/* ================= TAB ================= */
function switchTab(t){

  document.querySelectorAll(".tab-btn")
    .forEach(b=>b.classList.remove("active"));

  event.target.classList.add("active");

  document.getElementById("tab-my").style.display = t==="my"?"block":"none";
  document.getElementById("tab-lb").style.display = t==="lb"?"block":"none";

  if(t==="lb") loadLB();

}

/* ================= MODAL ================= */
function openModal(){document.getElementById("modal").classList.add("open")}
function closeModal(){document.getElementById("modal").classList.remove("open")}

/* ================= LOADING ================= */
function hideLoading(){
  document.getElementById("loading-screen").style.display="none";
  document.getElementById("app").classList.add("visible");
}

</script>

</body>
</html>
