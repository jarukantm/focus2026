<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Badge Collection</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<style>
/* ====== BASIC (ยกจากของเดิมแบบย่อ แต่คง UI หลัก) ====== */
body{
  margin:0;
  background:#0A0E1A;
  color:#E2E8F0;
  font-family:'Kanit',sans-serif;
}

/* HEADER */
header{
  padding:20px;
  display:flex;
  gap:12px;
  align-items:center;
}
.avatar{
  width:44px;height:44px;border-radius:50%;
  background:#1A2235;
}
.user-name{font-weight:700}

/* HERO */
.hero{
  margin:20px;
  padding:20px;
  background:#1A2235;
  border-radius:14px;
}
.hero-total{
  font-size:42px;
  font-family:'Space Mono';
  color:#F5C842;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  padding:0 20px;
}
.badge{
  background:#1A2235;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
}

/* TAB */
.tab{
  display:flex;
  gap:10px;
  padding:0 20px;
}
.tab button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1A2235;
  color:#fff;
  font-weight:700;
}
.tab button.active{
  background:#22D3EE;
  color:#000;
}

/* LEADERBOARD */
.lb{
  padding:0 20px 30px;
}
.lb-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #243050;
}
</style>
</head>

<body>

<header>
  <img class="avatar" id="avatar"/>
  <div>
    <div class="user-name" id="name">Loading...</div>
  </div>
</header>

<div class="hero">
  <div>Badge Score</div>
  <div class="hero-total" id="total">0</div>
</div>

<div class="tab">
  <button class="active" onclick="showTab('my')">My Badge</button>
  <button onclick="showTab('lb')">Leaderboard</button>
</div>

<!-- MY BADGE -->
<div id="tab-my">
  <div class="grid" id="badgeGrid"></div>

  <div style="padding:20px">
    <input id="code" placeholder="กรอกรหัส" style="width:100%;padding:10px"/>
    <button onclick="redeem()" style="width:100%;margin-top:10px;padding:12px;background:#22D3EE;border:none;font-weight:bold">Redeem</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="tab-lb" style="display:none">
  <div class="lb" id="leaderboard">Loading...</div>
</div>

<script>

const LIFF_ID = "2009815147-aGgIrfPv";
const GAS_URL = "https://script.google.com/macros/s/AKfycbxYDJk4lB606Hs4yGm4-1xheSXdsX901EnxR4L8KwBqqCORutiU88JELqHwJhDBxz1W/exec";

let userId="";
let displayName="";

// ================= INIT =================
async function init(){

  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  userId = profile.userId;
  displayName = profile.displayName;

  document.getElementById("name").innerText = displayName;
  document.getElementById("avatar").src = profile.pictureUrl;

  await api({action:"register",lineUserId:userId,displayName});

  await loadProfile();
  await loadLeaderboard();
}

// ================= API =================
async function api(body){
  try{
    const res = await fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify(body)
    });
    return await res.json();
  }catch(e){
    return {success:false};
  }
}

// ================= PROFILE =================
async function loadProfile(){

  const res = await api({
    action:"getProfile",
    lineUserId:userId
  });

  if(!res.success) return;

  document.getElementById("total").innerText = res.badges.total || 0;

  const grid = document.getElementById("badgeGrid");
  let html="";

  Object.keys(res.badges).forEach(k=>{
    if(k==="total") return;
    if(res.badges[k]==1){
      html+=`<div class="badge">✔ ${k}</div>`;
    }
  });

  grid.innerHTML = html;
}

// ================= REDEEM =================
async function redeem(){

  const code = document.getElementById("code").value;

  const res = await api({
    action:"redeemCode",
    lineUserId:userId,
    code
  });

  alert(res.message || "done");

  await loadProfile();
  await loadLeaderboard();
}

// ================= LEADERBOARD FIX =================
async function loadLeaderboard(){

  const res = await api({action:"getLeaderboard"});

  if(!res.success){
    document.getElementById("leaderboard").innerHTML="error";
    return;
  }

  let html="";

  res.leaderboard.forEach((u,i)=>{
    html+=`
      <div class="lb-item">
        <div>#${i+1} ${u.displayName}</div>
        <div>${u.total}</div>
      </div>
    `;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

// ================= TAB =================
function showTab(t){

  document.querySelectorAll(".tab button")
  .forEach(b=>b.classList.remove("active"));

  event.target.classList.add("active");

  document.getElementById("tab-my").style.display = t==="my"?"block":"none";
  document.getElementById("tab-lb").style.display = t==="lb"?"block":"none";

}

// start
init();

</script>

</body>
</html>
