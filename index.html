<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOCUS 2026 Badge Collection</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --gold: #fbbf24;
            --text: #f8fafc; --muted: #94a3b8; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Loading Overlay */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI Components */
        header { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); }
        
        .stats-card { margin: 20px; padding: 20px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--border); border-radius: 16px; text-align: center; }
        .progress-container { height: 10px; background: var(--border); border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width 0.5s ease; }

        .badge-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 20px; }
        .badge-item { background: var(--card); border: 1px solid var(--border); padding: 12px 5px; border-radius: 12px; text-align: center; opacity: 0.3; filter: grayscale(1); transition: 0.3s; }
        .badge-item.active { opacity: 1; filter: grayscale(0); border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }
        .badge-icon { font-size: 24px; margin-bottom: 5px; }
        .badge-label { font-size: 10px; color: var(--muted); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-redeem { display: block; width: calc(100% - 40px); margin: 25px auto; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .input-code { width: 100%; padding: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 20px; text-align: center; margin-bottom: 20px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: var(--card); border: 1px solid var(--border); border-radius: 50px; display: none; z-index: 1000; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:15px; color:var(--muted)">กำลังเชื่อมต่อ...</p></div>

<header>
    <img id="user-img" class="profile-img" src="" alt="">
    <div>
        <h2 id="user-name" style="font-size:18px">...</h2>
        <p style="font-size:12px; color:var(--muted)">Water Resource Conservation</p>
    </div>
</header>

<div class="stats-card">
    <p style="font-size:14px; color:var(--accent)">Badge ที่สะสมได้</p>
    <h1 id="total-text" style="font-size:48px; margin:5px 0">0 <small style="font-size:16px; color:var(--muted)">/ 10</small></h1>
    <div class="progress-container"><div id="progress-bar" class="progress-fill" style="width: 0%"></div></div>
    <p id="status-msg" style="font-size:12px; color:var(--muted)">สะสมครบเพื่อรับรางวัลพิเศษ!</p>
</div>

<div class="badge-grid" id="badge-container"></div>

<button class="btn-redeem" onclick="toggleModal(true)">🔑 กรอกรหัสรับ Badge</button>

<div class="modal" id="redeem-modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; text-align:center">กรอกรหัสกิจกรรม</h3>
        <input type="text" id="code-input" class="input-code" placeholder="เช่น FCA001" autocomplete="off" oninput="this.value = this.value.toUpperCase()">
        <button id="submit-btn" class="btn-redeem" style="width:100%; margin:0" onclick="handleRedeem()">ยืนยันรหัส</button>
        <button onclick="toggleModal(false)" style="width:100%; background:none; border:none; color:var(--muted); margin-top:15px; cursor:pointer">ปิดหน้าต่าง</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbztH2KZx4AXmHA-cktgRM1u7ywerNtTByEoBogZ3ZV_G6nN9icxcpiR_cQlog9Kf4jv/exec';
    const LIFF_ID = '2009815147-aGgIrfPv';
    
    const BADGE_LIST = [
        { id: 'FXC-A', icon: '⚡', name: 'FXC A' }, { id: 'FXC-B', icon: '⚡', name: 'FXC B' },
        { id: 'FXCXO-A', icon: '🔥', name: 'XO A' }, { id: 'FXCXO-B', icon: '🔥', name: 'XO B' },
        { id: 'FXCXU-A', icon: '💎', name: 'XU A' }, { id: 'FXCXU-B', icon: '💎', name: 'XU B' },
        { id: 'FXCXS-A', icon: '🌟', name: 'XS A' }, { id: 'FXCXS-B', icon: '🌟', name: 'XS B' },
        { id: 'SinghawayxFOCUS-A', icon: '🦁', name: 'FOCUS A' }, { id: 'SinghawayxFOCUS-B', icon: '🦁', name: 'FOCUS B' }
    ];

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const profile = await liff.getProfile();
            document.getElementById('user-img').src = profile.pictureUrl;
            document.getElementById('user-name').innerText = profile.displayName;

            await apiCall('register', { 
                lineUserId: profile.userId, 
                displayName: profile.displayName, 
                pictureUrl: profile.pictureUrl 
            });

            await loadData();
            
            // Auto check-in if URL has code
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('code')) {
                document.getElementById('code-input').value = urlParams.get('code');
                toggleModal(true);
            }

        } catch (err) {
            console.error(err);
            showToast("⚠️ ไม่สามารถโหลดข้อมูลได้", "#f87171");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function apiCall(action, data) {
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action, ...data })
            });
            // ตรวจสอบว่า response เป็น JSON หรือไม่
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                console.error("Non-JSON response:", text);
                return { success: false, message: "Server Response Error" };
            }
        } catch (err) {
            return { success: false, message: "Network Error" };
        }
    }

    async function loadData() {
        const profile = await liff.getProfile();
        const res = await apiCall('getProfile', { lineUserId: profile.userId });
        
        if (res.success) {
            const badges = res.badges || {};
            const total = badges.total || 0;
            
            document.getElementById('total-text').innerHTML = `${total} <small style="font-size:16px; color:var(--muted)">/ 10</small>`;
            document.getElementById('progress-bar').style.width = (total * 10) + '%';

            const container = document.getElementById('badge-container');
            container.innerHTML = BADGE_LIST.map(b => `
                <div class="badge-item ${badges[b.id] >= 1 ? 'active' : ''}">
                    <div class="badge-icon">${b.icon}</div>
                    <span class="badge-label">${b.name}</span>
                </div>
            `).join('');

            if(total >= 10) {
                document.getElementById('status-msg').innerText = "🎉 คุณได้รับรางวัลเกียรติยศครบถ้วน!";
                document.getElementById('status-msg').style.color = "var(--gold)";
            }
        }
    }

    async function handleRedeem() {
        const codeInput = document.getElementById('code-input');
        const code = codeInput.value.trim();
        if (!code) return;

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "กำลังตรวจสอบ...";

        const profile = await liff.getProfile();
        const res = await apiCall('redeemCode', { lineUserId: profile.userId, code: code });

        if (res.success) {
            showToast("🎉 ยินดีด้วย! คุณได้รับ Badge ใหม่", "var(--accent)");
            toggleModal(false);
            codeInput.value = "";
            await loadData();
        } else {
            showToast(res.message || "❌ รหัสไม่ถูกต้อง", "#f87171");
        }
        
        btn.disabled = false;
        btn.innerText = "ยืนยันรหัส";
    }

    function toggleModal(show) {
        document.getElementById('redeem-modal').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('code-input').focus();
    }

    function showToast(msg, color) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.borderColor = color;
        toast.style.color = color;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    init();
</script>
</body>
</html>
