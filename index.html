<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Badge System</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body { font-family: Kanit; background:#0A0E1A; color:#fff; margin:0; }

.tab-btn.active { color:#22D3EE; border-bottom:2px solid #22D3EE; }

.tab-nav { display:flex; gap:20px; padding:10px; }

.tab-btn {
  flex:1;
  padding:10px;
  background:none;
  border:none;
  color:#999;
  font-weight:700;
}

.section { padding:15px; }

.lb-item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:#1A2235;
  margin-bottom:8px;
  border-radius:10px;
}

.lb-avatar { width:30px; height:30px; border-radius:50%; }

.lb-total { margin-left:auto; color:#F5C842; font-weight:700; }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  background:#333; padding:10px 15px;
  border-radius:10px; display:none;
}
.toast.show { display:block; }
</style>
</head>

<body>

<!-- TAB -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('my', this)">My Badge</button>
  <button class="tab-btn" onclick="switchTab('board', this)">Leaderboard</button>
</div>

<!-- MY -->
<div id="tab-my" class="section">
  <h2>My Badge</h2>

  <div>Total: <span id="total">0</span></div>

  <input id="code" placeholder="ใส่ Code" style="padding:10px;width:100%;margin-top:10px;" />

  <button onclick="submitCode()" style="margin-top:10px;padding:10px;width:100%;">
    Redeem
  </button>
</div>

<!-- LEADERBOARD -->
<div id="tab-board" class="section" style="display:none">
  <h2>Leaderboard</h2>
  <div id="lb">Loading...</div>
</div>

<div id="toast" class="toast"></div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxYDJk4lB606Hs4yGm4-1xheSXdsX901EnxR4L8KwBqqCORutiU88JELqHwJhDBxz1W/exec";

let currentUser = null;

// ===================== INIT =====================
window.onload = async () => {

  await liff.init({ liffId: "2009815147-aGgIrfPv" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  currentUser = await liff.getProfile();

  await registerUser();

  await loadProfile();

};

// ===================== API =====================
async function apiCall(body) {

  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  return await res.json();
}

// ================= REGISTER =================
async function registerUser() {
  await apiCall({
    action: "register",
    lineUserId: currentUser.userId,
    displayName: currentUser.displayName,
    pictureUrl: currentUser.pictureUrl
  });
}

// ================= PROFILE =================
async function loadProfile() {

  const res = await apiCall({
    action: "getProfile",
    lineUserId: currentUser.userId
  });

  if (res && res.badges) {
    document.getElementById("total").innerText =
      res.badges.total || 0;
  }
}

// ================= REDEEM =================
async function submitCode() {

  const code = document.getElementById("code").value.trim();

  if (!code) return toast("ใส่ Code ก่อน", "error");

  const res = await apiCall({
    action: "redeemCode",
    lineUserId: currentUser.userId,
    code
  });

  if (!res) return toast("ไม่มี response", "error");

  if (res.success) {
    toast("สำเร็จ! +" + res.eventCode, "success");
    loadProfile();
  } else {
    toast(res.message || "Error", "error");
  }
}

// ================= LEADERBOARD =================
async function loadLeaderboard() {

  const el = document.getElementById("lb");

  el.innerHTML = "Loading...";

  try {

    const res = await apiCall({
      action: "getLeaderboard"
    });

    if (!res.success || !res.leaderboard) {
      el.innerHTML = "ไม่มีข้อมูล";
      return;
    }

    el.innerHTML = res.leaderboard.map((u, i) => `
      <div class="lb-item">
        <div>${i+1}</div>
        <img class="lb-avatar" src="${u.pictureUrl || ''}" />
        <div>${u.displayName || u.userId}</div>
        <div class="lb-total">${u.total}</div>
      </div>
    `).join('');

  } catch (e) {
    el.innerHTML = "โหลดไม่ได้";
  }

}

// ================= TAB =================
function switchTab(tab, el) {

  document.querySelectorAll(".tab-btn")
    .forEach(b => b.classList.remove("active"));

  el.classList.add("active");

  document.getElementById("tab-my").style.display =
    tab === "my" ? "block" : "none";

  document.getElementById("tab-board").style.display =
    tab === "board" ? "block" : "none";

  if (tab === "board") loadLeaderboard();

}

// ================= TOAST =================
function toast(msg, type) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.className = "toast show";
  setTimeout(() => t.className = "toast", 2500);
}

</script>

</body>
</html>
