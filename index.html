<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Badge</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{background:#0A0E1A;color:#E2E8F0;font-family:Kanit}
.card{background:#1A2235;border-radius:14px;padding:16px;margin:10px}
button{padding:12px;width:100%;border-radius:10px;border:0;background:#22D3EE;font-weight:700}
.badge{display:inline-block;margin:4px;padding:6px 10px;background:#111827;border-radius:8px}
.tab{display:flex}
.tab button{flex:1}
.active{background:#22D3EE;color:#000}
</style>

</head>
<body>

<h3 id="name">Loading...</h3>

<div class="tab">
  <button onclick="show('my')" class="active" id="t1">My</button>
  <button onclick="show('lb')" id="t2">Board</button>
</div>

<div id="my">
  <div class="card">
    <h2 id="total">0</h2>
    <div id="badges"></div>
  </div>

  <input id="code" placeholder="CODE"/>
  <button onclick="redeem()">ยืนยันรับ Badge</button>
</div>

<div id="lb" style="display:none">
  <div id="board">Loading...</div>
</div>

<script>

const GAS = "https://script.google.com/macros/s/AKfycbw34Fx2QTMeglkKW3x-dG7vZRqIYkDrB63rBPuA0VIBjm2L5nNsqW1AYS8kBHR8VuPK/exec";
let user;

async function init(){
  await liff.init({liffId:"YOUR_LIFF"});
  user = await liff.getProfile();

  document.getElementById("name").innerText = user.displayName;

  await fetchProfile();
}

async function api(body){
  const r = await fetch(GAS,{
    method:"POST",
    body:JSON.stringify(body)
  });
  return r.json();
}

async function fetchProfile(){
  const res = await api({action:"getProfile",lineUserId:user.userId});

  document.getElementById("total").innerText = res.badges.total;

  const wrap = document.getElementById("badges");
  wrap.innerHTML = Object.keys(res.badges)
    .filter(k=>k!=="total")
    .map(k=>`<span class="badge">${k}:${res.badges[k]}</span>`)
    .join("");
}

async function redeem(){
  const code = document.getElementById("code").value;

  const res = await api({
    action:"redeemCode",
    lineUserId:user.userId,
    code
  });

  alert(res.message || "OK");
  await fetchProfile();
}

async function loadLB(){
  const res = await api({action:"getLeaderboard"});

  document.getElementById("board").innerHTML =
    res.leaderboard.map((u,i)=>
      `<div class="card">${i+1}. ${u.displayName} (${u.total})</div>`
    ).join("");
}

function show(t){
  document.getElementById("my").style.display = t==="my"?"block":"none";
  document.getElementById("lb").style.display = t==="lb"?"block":"none";

  document.getElementById("t1").classList.toggle("active",t==="my");
  document.getElementById("t2").classList.toggle("active",t==="lb");

  if(t==="lb") loadLB();
}

init();

</script>

</body>
</html>
