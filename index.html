<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Badge Collection</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
/* ====== KEEP YOUR ORIGINAL UI ====== */
body { margin:0; font-family:'Kanit',sans-serif; background:#0A0E1A; color:#E2E8F0; }

header { padding:20px; display:flex; align-items:center; gap:12px; }
.avatar { width:48px;height:48px;border-radius:50%;border:2px solid #F5C842; }
.user-name { font-weight:600; }

.tab-nav { display:flex; background:#111827; }
.tab-btn {
  flex:1; padding:14px; background:none; border:none;
  color:#64748B; font-weight:600;
}
.tab-btn.active { color:#22D3EE; border-bottom:2px solid #22D3EE; }

.section { padding:16px; }

/* HERO */
.hero { background:#1E3A5F; padding:20px; border-radius:12px; }
.hero-total { font-size:42px; font-weight:900; color:#F5C842; }

/* BADGES */
.badges-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.badge-item { background:#1A2235; padding:10px; border-radius:10px; text-align:center; }
.badge-item.earned { border:1px solid #F5C842; }

/* LEADERBOARD */
.lb-item { display:flex; gap:10px; padding:10px; background:#1A2235; margin:6px 0; border-radius:10px; }
.lb-avatar { width:36px;height:36px;border-radius:50%; }
.lb-total { margin-left:auto; color:#F5C842; }

/* SCAN */
.btn-scan {
  width:100%; padding:16px; background:#22D3EE;
  border:none; border-radius:10px; font-weight:700;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img id="user-avatar" class="avatar">
  <div>
    <div id="user-name">Loading...</div>
    <small>Badge System</small>
  </div>
</header>

<!-- TAB -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('my')">ของฉัน</button>
  <button class="tab-btn" onclick="switchTab('board')">Leaderboard</button>
</div>

<!-- MY -->
<div id="tab-my" class="section">

  <div class="hero">
    <div>คะแนนสะสม</div>
    <div class="hero-total" id="total-count">0</div>
  </div>

  <h4>Badge ทั้งหมด</h4>
  <div class="badges-grid" id="badges-grid"></div>

  <button class="btn-scan" onclick="openScanModal()">
    กรอกรหัส / รับ Badge
  </button>

</div>

<!-- LEADERBOARD -->
<div id="tab-board" class="section" style="display:none;">
  <h3>Leaderboard</h3>
  <div id="leaderboard-list">Loading...</div>
</div>

<!-- MODAL -->
<div id="scan-modal" style="display:none;padding:16px;">
  <input id="qr-token-input" placeholder="ใส่ Code">
  <button class="btn-scan" onclick="submitCheckin()">ยืนยัน</button>
  <button onclick="closeScanModal()">ปิด</button>
</div>

<!-- TOAST -->
<div id="toast" style="position:fixed;top:10px;left:50%;transform:translateX(-50%);
background:#1A2235;padding:10px;border-radius:10px;display:none;"></div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxYDJk4lB606Hs4yGm4-1xheSXdsX901EnxR4L8KwBqqCORutiU88JELqHwJhDBxz1W/exec";
const LIFF_ID = "2009815147-aGgIrfPv";

let user = null;

// ================= INIT =================
window.onload = async () => {

  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  user = await liff.getProfile();

  document.getElementById("user-name").innerText = user.displayName;
  document.getElementById("user-avatar").src = user.pictureUrl;

  await api({
    action:"register",
    lineUserId:user.userId,
    displayName:user.displayName,
    pictureUrl:user.pictureUrl
  });

  await loadProfile();
  await loadLeaderboard();
};

// ================= API =================
async function api(body){
  const res = await fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify(body)
  });
  return res.json();
}

// ================= PROFILE =================
async function loadProfile(){

  const res = await api({
    action:"getProfile",
    lineUserId:user.userId
  });

  const total = res.badges?.total || 0;

  document.getElementById("total-count").innerText = total;

  renderBadges(res.badges || {});
}

// ================= BADGES =================
function renderBadges(b){

  const list = [
    "FXC-A","FXC-B",
    "FXCXO-A","FXCXO-B",
    "FXCXU-A","FXCXU-B",
    "FXCXS-A","FXCXS-B",
    "SinghawayxFOCUS-A","SinghawayxFOCUS-B"
  ];

  document.getElementById("badges-grid").innerHTML =
    list.map(x=>`
      <div class="badge-item ${b[x]? "earned":""}">
        ${x}
      </div>
    `).join("");
}

// ================= REDEEM =================
async function submitCheckin(){

  const code = document.getElementById("qr-token-input").value.trim();

  const res = await api({
    action:"redeemCode",
    lineUserId:user.userId,
    code:code
  });

  if(res.success){
    toast("สำเร็จ");
    await loadProfile();
    await loadLeaderboard();
  } else {
    toast(res.message);
  }
}

// ================= LEADERBOARD (FIXED) =================
async function loadLeaderboard(){

  const res = await api({action:"getLeaderboard"});

  const el = document.getElementById("leaderboard-list");

  if(!res.success || !res.leaderboard.length){
    el.innerHTML = "ไม่มีข้อมูล";
    return;
  }

  el.innerHTML = res.leaderboard.map((u,i)=>`
    <div class="lb-item">
      <div>${i+1}</div>
      <img class="lb-avatar" src="${u.pictureUrl||''}">
      <div>${u.displayName}</div>
      <div class="lb-total">${u.total}</div>
    </div>
  `).join("");
}

// ================= TAB =================
function switchTab(t){

  document.getElementById("tab-my").style.display = t==="my"?"block":"none";
  document.getElementById("tab-board").style.display = t==="board"?"block":"none";

  document.querySelectorAll(".tab-btn")
    .forEach(b=>b.classList.remove("active"));

  event.target.classList.add("active");

  if(t==="board") loadLeaderboard();
}

// ================= MODAL =================
function openScanModal(){
  document.getElementById("scan-modal").style.display="block";
}

function closeScanModal(){
  document.getElementById("scan-modal").style.display="none";
}

// ================= TOAST =================
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

</script>

</body>
</html>
