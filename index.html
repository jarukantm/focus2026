<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Badge Collection</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    /* ใช้ CSS เดิมของคุณที่สวยงามอยู่แล้วได้เลยครับ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --c-bg: #0A0E1A; --c-surface: #111827; --c-card: #1A2235; --c-border: #243050;
      --c-gold: #F5C842; --c-cyan: #22D3EE; --c-red: #F87171; --c-text: #E2E8F0; --c-muted: #64748B;
    }
    html, body { background: var(--c-bg); color: var(--c-text); font-family: 'Kanit', sans-serif; min-height: 100dvh; overflow-x: hidden; }
    #loading-screen { position: fixed; inset: 0; background: var(--c-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity .5s ease; }
    #app { display: none; flex-direction: column; }
    #app.visible { display: flex; }
    header { padding: 20px; display: flex; align-items: center; gap: 14px; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--c-gold); }
    .tab-nav { display: flex; background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 0 20px; gap: 24px; }
    .tab-btn { padding: 14px 0; background: none; border: none; color: var(--c-muted); font-weight: 600; cursor: pointer; }
    .tab-btn.active { color: var(--c-cyan); border-bottom: 2px solid var(--c-cyan); }
    .hero { margin: 20px; background: linear-gradient(135deg, #1E3A5F 0%, #0A1628 100%); border-radius: 14px; padding: 24px 20px; border: 1px solid var(--c-border); }
    .badges-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 20px; }
    .badge-item { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--c-card); border-radius: 14px; opacity: 0.2; filter: grayscale(1); transition: .4s; border: 1px solid var(--c-border); }
    .badge-item.earned { opacity: 1; filter: grayscale(0); border-color: var(--c-gold); }
    .btn-scan { width: calc(100% - 40px); margin: 20px; padding: 16px; border-radius: 14px; background: var(--c-cyan); color: #0A0E1A; font-weight: 700; border: none; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 99px; background: var(--c-card); border: 1px solid var(--c-border); opacity: 0; transition: .3s; z-index: 2000; font-size: 14px; }
    .toast.show { opacity: 1; bottom: 50px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1500; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--c-card); padding: 24px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div style="font-size: 40px;">⏳</div>
  <div style="margin-top: 10px; font-weight: 600;">LOADING...</div>
</div>

<div id="app">
  <header>
    <img id="user-avatar" class="avatar" src="" alt="profile"/>
    <div>
      <div id="user-name" style="font-weight: 600;">...</div>
      <div style="font-size: 12px; color: var(--c-muted);">Water Resource Conservation</div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" id="btn-my" onclick="switchTab('my')">Badge ของฉัน</button>
    <button class="tab-btn" id="btn-board" onclick="switchTab('board')">อันดับสูงสุด</button>
  </nav>

  <div id="tab-my">
    <div class="hero">
      <div style="font-size: 12px; color: var(--c-cyan);">PROGRESS</div>
      <div style="font-size: 48px; font-weight: 900;" id="total-count">0 <span style="font-size: 18px; color: var(--c-muted);">/ 10</span></div>
      <div style="height: 6px; background: var(--c-border); border-radius: 10px; margin-top: 10px;">
        <div id="progress-fill" style="width: 0%; height: 100%; background: var(--c-cyan); transition: 1s;"></div>
      </div>
    </div>
    <div class="badges-grid" id="badges-grid"></div>
    <button class="btn-scan" onclick="openModal()">+ สะสม Badge ใหม่</button>
  </div>

  <div id="tab-board" style="display:none; padding: 20px;">
    <div id="leaderboard-list"></div>
  </div>
</div>

<div class="modal-overlay" id="redeem-modal">
  <div class="modal">
    <h3>กรอกรหัส Badge</h3>
    <input type="text" id="code-input" style="width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid var(--c-border); background: #000; color: #fff; text-align: center; font-size: 20px; outline: none;">
    <button class="btn-scan" style="margin: 0; width: 100%;" onclick="submitRedeem()">ยืนยัน</button>
    <div onclick="closeModal()" style="margin-top: 15px; color: var(--c-muted); font-size: 14px; cursor: pointer;">ยกเลิก</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVIlpMsrVjaXYNhhj0S09vRUQrPBnhytcL3T3bH_4y2pvj9TK8BWN2kaU2nxgGUP8/exec';
const LIFF_ID = '2009815147-aGgIrfPv';
const BADGE_CONFIG = [
  {id:'FXC-A', icon:'⚡'}, {id:'FXC-B', icon:'⚡'},
  {id:'FXCXO-A', icon:'🔥'}, {id:'FXCXO-B', icon:'🔥'},
  {id:'FXCXU-A', icon:'💎'}, {id:'FXCXU-B', icon:'💎'},
  {id:'FXCXS-A', icon:'🌟'}, {id:'FXCXS-B', icon:'🌟'},
  {id:'SinghawayxFOCUS-A', icon:'🦁'}, {id:'SinghawayxFOCUS-B', icon:'🦁'}
];

let userProfile = null;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    
    userProfile = await liff.getProfile();
    document.getElementById('user-name').textContent = userProfile.displayName;
    document.getElementById('user-avatar').src = userProfile.pictureUrl;

    // 1. ลงทะเบียนก่อน
    await apiCall('register', {
      lineUserId: userProfile.userId,
      displayName: userProfile.displayName,
      pictureUrl: userProfile.pictureUrl
    });

    // 2. เช็ค Auto-token
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) await executeRedeem(token);

    // 3. โหลดข้อมูล
    await refreshData();

    // ปิด Loading
    document.getElementById('loading-screen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 500);

  } catch (err) {
    console.error(err);
    showToast("กรุณาเปิดแอปใหม่อีกครั้ง", "error");
  }
}

async function apiCall(action, extraData = {}) {
  const payload = { action, ...extraData };
  const res = await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors', // สำคัญ: ป้องกันปัญหา CORS ในบางเบราว์เซอร์
    body: JSON.stringify(payload)
  });
  // เนื่องจากใช้ no-cors เราจะไม่สามารถอ่าน response ตรงๆ ได้ในบางกรณี 
  // หากคุณใช้ GAS แบบปกติ แนะนำให้เอา mode: 'no-cors' ออกถ้า Verify ผ่านแล้ว
  return res;
}

// ฟังก์ชันดึงข้อมูลแบบปกติ (ต้องอ่าน Response ได้)
async function fetchSafe(payload) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch (e) {
    return { success: false, message: "Connection Error" };
  }
}

async function refreshData() {
  if (!userProfile) return;
  const data = await fetchSafe({ action: 'getProfile', lineUserId: userProfile.userId });
  if (data.success) {
    const b = data.badges;
    const total = b.total || 0;
    document.getElementById('total-count').innerHTML = `${total} <span style="font-size: 18px; color: var(--c-muted);">/ 10</span>`;
    document.getElementById('progress-fill').style.width = (total * 10) + '%';
    
    const grid = document.getElementById('badges-grid');
    grid.innerHTML = BADGE_CONFIG.map(conf => `
      <div class="badge-item ${b[conf.id] >= 1 ? 'earned' : ''}">
        <div style="font-size: 20px;">${conf.icon}</div>
        <div style="font-size: 8px; font-weight: 600;">${conf.id.split('-')[0]}</div>
      </div>
    `).join('');
  }
}

async function executeRedeem(code) {
  if (!userProfile) return;
  showToast("กำลังตรวจสอบ...", "info");
  const data = await fetchSafe({ 
    action: 'redeemCode', 
    lineUserId: userProfile.userId, 
    code: code.trim() 
  });
  
  if (data.success) {
    showToast("สำเร็จ! ได้รับ Badge", "success");
    await refreshData();
  } else {
    showToast(data.message || "รหัสไม่ถูกต้อง", "error");
  }
}

function switchTab(tab) {
  const isMy = tab === 'my';
  document.getElementById('tab-my').style.display = isMy ? 'block' : 'none';
  document.getElementById('tab-board').style.display = isMy ? 'none' : 'block';
  document.getElementById('btn-my').classList.toggle('active', isMy);
  document.getElementById('btn-board').classList.toggle('active', !isMy);
  if (!isMy) loadLeaderboard();
}

async function loadLeaderboard() {
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = "กำลังโหลดอันดับ...";
  const data = await fetchSafe({ action: 'getLeaderboard' });
  if (data.success) {
    list.innerHTML = data.leaderboard.map((u, i) => `
      <div style="display:flex; align-items:center; gap:12px; padding:12px; background:var(--c-card); margin-bottom:8px; border-radius:10px;">
        <div style="width:20px; font-weight:900;">${i+1}</div>
        <img src="${u.pictureUrl}" style="width:30px; height:30px; border-radius:50%;">
        <div style="flex:1;">${u.displayName}</div>
        <div style="color:var(--c-gold); font-weight:700;">${u.total}</div>
      </div>
    `).join('');
  }
}

function openModal() { document.getElementById('redeem-modal').classList.add('open'); }
function closeModal() { document.getElementById('redeem-modal').classList.remove('open'); }
function submitRedeem() {
  const val = document.getElementById('code-input').value;
  if (val) {
    closeModal();
    executeRedeem(val);
    document.getElementById('code-input').value = "";
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = type === 'success' ? 'var(--c-cyan)' : (type === 'error' ? 'var(--c-red)' : '#fff');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
