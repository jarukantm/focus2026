<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d0d14">
<title>FOCUS Forward 2026 - Badge Collector</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'Kanit',sans-serif;font-weight:300;
  background:#0d0d14;color:#eeeef5;
  min-height:100vh;display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  -webkit-font-smoothing:antialiased;
}

/* ── CSS VARS ── */
:root{
  --bg:#0d0d14;
  --s1:#16161f;--s2:#1e1e2a;--s3:#252535;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.2);
  --tx:#eeeef5;--mu:#6a6a85;
  --ac:#7c6dfa;--ac2:#a78bfa;
  --gd:#f5c842;--gd2:#ffe082;
  --gn:#34d399;--rd:#f87171;
  --r:14px;--rs:10px;
}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:16px;
}
.spin{
  width:48px;height:48px;border-radius:50%;
  border:3px solid var(--b2);border-top-color:var(--ac);
  animation:rot .75s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}
.ld-t{font-size:13px;color:var(--mu)}

/* ── NAV ── */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:100;
  background:var(--s1);border-top:1px solid var(--b2);
  display:flex;
  padding-bottom:max(env(safe-area-inset-bottom),6px);
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:9px 0;
  background:none;border:none;cursor:pointer;
  color:var(--mu);font-family:'Kanit',sans-serif;font-size:10px;font-weight:400;
  transition:color .15s;
}
.nb.on{color:var(--ac2)}
.nb-ic{font-size:18px;line-height:1}
.nb.on::before{
  content:'';display:block;height:2px;width:24px;
  background:var(--ac2);border-radius:2px;
  position:absolute;top:0;
}
.nb{position:relative}

/* ── PAGES ── */
.pg{display:none;flex-direction:column;flex:1;padding:22px 16px 86px;overflow-x:hidden}
.pg.on{display:flex;animation:pgIn .2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── PAGE HEADER ── */
.ph{margin-bottom:20px}
.pt{
  font-size:22px;font-weight:700;letter-spacing:.02em;
  background:linear-gradient(120deg,#fff 40%,var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.ps{font-size:12px;color:var(--mu);margin-top:3px}

/* ── USER CHIP ── */
.uc{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--s2);border:1px solid var(--b2);border-radius:50px;
  padding:5px 14px 5px 5px;margin-bottom:18px;max-width:100%;
}
.uc img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid var(--ac)}
.uc-n{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.uc-i{font-size:10px;color:var(--mu)}

.lbl{font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 10px}

/* ── REDEEM ── */
.code-card{
  background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
  padding:20px;margin-bottom:14px;
}
.code-lbl{font-size:11px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.code-in{
  width:100%;background:var(--bg);border:1.5px solid var(--b2);border-radius:var(--rs);
  padding:15px 10px;font-size:28px;font-family:'Space Mono',monospace;font-weight:700;
  color:var(--tx);text-align:center;letter-spacing:10px;text-transform:uppercase;
}
.code-in:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,109,250,.15)}
.btn-main{
  width:100%;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);
  padding:15px;font-size:14px;font-weight:600;cursor:pointer;
}

/* Toast */
.toast{border-radius:var(--rs);padding:13px 15px;margin-top:13px;display:none;border-left:3px solid;animation:up .22s ease;}
.toast.ok{background:rgba(52,211,153,.08);border-color:var(--gn)}
.toast.er{background:rgba(248,113,113,.08);border-color:var(--rd)}

/* ── MY BADGES ── */
.prog-card{
  background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
  padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;
}
.pr-n{font-size:30px;font-weight:700;color:var(--gd);font-family:'Space Mono',monospace}
.pr-n span{font-size:16px;color:var(--mu);font-weight:400}
.pr-bar-wrap{height:3px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:10px}
.pr-bar{height:100%;background:linear-gradient(90deg,var(--ac),var(--gd));transition:width .6s ease;width:0%}

.act-list{display:flex;flex-direction:column;gap:9px}
.act-card{
  background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:14px;display:flex;align-items:center;gap:13px;
}
.act-card.on{border-color:rgba(245,200,66,.28)}
.act-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--s3);}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;border:1px solid var(--b1)}
.chip-ok{background:rgba(245,200,66,.1);color:var(--gd);border-color:rgba(245,200,66,.28)}

/* ── LEADERBOARD ── */
.stat-g{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.sc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:13px}
.sv{font-size:24px;font-weight:700;font-family:'Space Mono',monospace;color:var(--ac2)}
.lb{display:flex;flex-direction:column;gap:7px}
.lbr{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:10px;}
.ldots{display:flex;gap:2px;align-items:center;flex-wrap:nowrap}
.ld{width:5px;height:5px;border-radius:50%;background:var(--b2)}
.ld.on{background:var(--gd)}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="ld-t">FOCUS Digital Badge Connecting...</div>
</div>

<!-- PAGE 1: REDEEM -->
<div class="pg on" id="pg-redeem">
  <div class="ph"><div class="pt">Redeem Badge</div><div class="ps">กรอกรหัส 6 หลักเพื่อรับเข็มกลัดดิจิทัล</div></div>
  <div class="uc"><img id="p1" src=""><div class="uc-n" id="n1">-</div></div>
  <div class="code-card">
    <div class="code-lbl">🎟 Code (เช่น FXC001)</div>
    <input type="text" id="codeIn" class="code-in" placeholder="XXXNNN" maxlength="6">
  </div>
  <button class="btn-main" id="rBtn" onclick="doRedeem()">สะสม Badge →</button>
  <div class="toast" id="toast"><div class="toast-t" id="tt"></div><div class="toast-s" id="ts"></div></div>
</div>

<!-- PAGE 2: MY BADGES -->
<div class="pg" id="pg-badges">
  <div class="ph"><div class="pt">My Progress</div><div class="ps">สะสมให้ครบ 10 กิจกรรม</div></div>
  <div class="prog-card">
    <div style="flex:1">
      <div class="pr-n" id="pn">0<span>/10</span></div>
      <div class="pr-bar-wrap"><div class="pr-bar" id="pb"></div></div>
    </div>
  </div>
  <div class="act-list" id="actList"></div>
</div>

<!-- PAGE 3: LEADERBOARD -->
<div class="pg" id="pg-dash">
  <div class="ph"><div class="pt">Leaderboard</div><div class="ps">ทำเนียบผู้สะสมสูงสุด</div></div>
  <div class="stat-g">
    <div class="sc"><div class="sv" id="stU">0</div><div class="sl">ผู้เข้าร่วม</div></div>
    <div class="sc"><div class="sv" id="stC">0</div><div class="sl">สะสมครบ 10</div></div>
  </div>
  <div class="lb" id="lb"></div>
</div>

<nav class="nav">
  <button class="nb on" id="nv-redeem" onclick="goPage('redeem')"><div class="nb-ic">🎟️</div><span>Redeem</span></button>
  <button class="nb" id="nv-badges" onclick="goPage('badges')"><div class="nb-ic">🏅</div><span>Badges</span></button>
  <button class="nb" id="nv-dash" onclick="goPage('dash')"><div class="nb-ic">🏆</div><span>Rank</span></button>
</nav>

<script>
const LIFF_ID = '2009815147-aGgIrfPv'; 
const GAS_URL = '
https://script.google.com/macros/s/AKfycbwDmqiqI1pTuHsQ6Z2KpFP7d_kD-kTjHBYwGFVJ7_Bh-fgwF1sNfdbJoaHA92lZrcUi/exec';

const ACTS = [
  {prefix:'FXC-A', name:'Fast A', full:'Activity A', icon:'🥇'},
  {prefix:'FXC-B', name:'Fast B', full:'Activity B', icon:'🥈'},
  {prefix:'FXCXO-A', name:'Ownership A', icon:'🥉'},
  {prefix:'FXCXO-B', name:'Ownership B', icon:'🏅'},
  {prefix:'FXCXU-A', name:'United A', icon:'💎'},
  {prefix:'FXCXU-B', name:'United B', icon:'✨'},
  {prefix:'FXCXS-A', name:'Strong A', icon:'🛡️'},
  {prefix:'FXCXS-B', name:'Strong B', icon:'⚔️'},
  {prefix:'SinghawayxFOCUS-A', name:'Sing A', icon:'🏆'},
  {prefix:'SinghawayxFOCUS-B', name:'Sing B', icon:'🌟'},
];

let profile = null;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    document.getElementById('p1').src = profile.pictureUrl;
    document.getElementById('n1').textContent = profile.displayName;
    document.getElementById('loading').style.display = 'none';
    loadData();
  } catch (e) { console.error(e); }
}

function goPage(id) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  document.getElementById('nv-'+id).classList.add('on');
}

async function loadData() {
  const [bRes, lRes] = await Promise.all([
    callAPI({ action:'getUserBadges', lineUserId:profile.userId }),
    callAPI({ action:'getLeaderboard' })
  ]);
  renderBadges(bRes.badges || []);
  renderLB(lRes.leaderboard || [], lRes);
}

function renderBadges(badges) {
  const earned = badges.map(b => b.prefix);
  document.getElementById('pn').innerHTML = `${earned.length}<span>/10</span>`;
  document.getElementById('pb').style.width = (earned.length / 10 * 100) + '%';
  
  document.getElementById('actList').innerHTML = ACTS.map(a => {
    const ok = earned.includes(a.prefix);
    return `<div class="act-card${ok?' on':''}">
      <div class="act-ic">${a.icon}</div>
      <div style="flex:1"><div class="act-nm">${a.name}</div></div>
      <div class="chip ${ok?'chip-ok':''}">${ok?'ได้รับแล้ว':'ยังไม่มี'}</div>
    </div>`;
  }).join('');
}

function renderLB(rows, stats) {
  document.getElementById('stU').textContent = stats.totalUsers || 0;
  document.getElementById('stC').textContent = stats.totalComplete || 0;
  document.getElementById('lb').innerHTML = rows.map((u, i) => `
    <div class="lbr">
      <div style="width:20px; font-size:12px">${i+1}</div>
      <div style="flex:1">
        <div style="font-size:13px; font-weight:600">${u.displayName}</div>
        <div class="ldots">${ACTS.map(a => `<div class="ld${(u.prefixes||[]).includes(a.prefix)?' on':''}"></div>`).join('')}</div>
      </div>
      <div style="font-weight:700">${u.total}</div>
    </div>
  `).join('');
}

async function doRedeem() {
  const code = document.getElementById('codeIn').value.trim().toUpperCase();
  if(!code) return;
  const btn = document.getElementById('rBtn');
  btn.disabled = true;
  try {
    const res = await callAPI({ 
      action:'redeemCode', 
      lineUserId:profile.userId, 
      displayName:profile.displayName, 
      pictureUrl:profile.pictureUrl,
      code 
    });
    const t = document.getElementById('toast');
    t.style.display = 'block';
    t.className = 'toast ' + (res.success?'ok':'er');
    document.getElementById('tt').textContent = res.success ? 'สำเร็จ!' : 'ขออภัย';
    document.getElementById('ts').textContent = res.message || 'ได้รับ Badge แล้ว';
    if(res.success) { document.getElementById('codeIn').value = ''; loadData(); }
  } catch (e) { console.error(e); }
  btn.disabled = false;
}

async function callAPI(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

init();
</script>
</body>
</html>
